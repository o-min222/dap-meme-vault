id: io.github.o-min222.meme_vault
name: Meme Vault
version: 0.5.0
manifest_version: 2
entry: dap_meme_vault.plugin:activate
author: o-min222
description: 자주 쓰는 짤을 제목과 태그로 보관하고, AI로 새 짤을 생성하고, 상황에 맞게 찾아 붙여넣는 이미지 저장소.
surface: user
permissions:
  - storage.private
  - window.palette
  - input.synthesize
  - dragdrop.export
  - image.generate
execution_modes:
  - user
